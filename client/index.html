<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Man - Test Client</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Clipboard Man Test Client</h1>
            <div class="server-status">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="statusText">Checking server...</span>
            </div>
        </header>

        <main>
            <!-- Text Section -->
            <section class="card">
                <h2>📝 Send Text</h2>
                <div class="form-group">
                    <textarea 
                        id="textInput" 
                        placeholder="Enter text to send..." 
                        rows="5"
                    ></textarea>
                </div>
                <div class="button-row">
                    <button onclick="sendText()" class="btn btn-primary">
                        Send Text
                    </button>
                    <button onclick="clearText()" class="btn btn-secondary">
                        Clear
                    </button>
                </div>
                <div class="quick-actions">
                    <h3>Quick Test:</h3>
                    <button onclick="sendQuickText('Hello from Web!')" class="btn btn-small">
                        Simple Text
                    </button>
                    <button onclick="sendQuickText('Line 1\nLine 2\nLine 3')" class="btn btn-small">
                        Multi-line
                    </button>
                    <button onclick="sendQuickText('https://www.google.com')" class="btn btn-small">
                        URL
                    </button>
                    <button onclick="sendQuickText('function test() {\n  console.log(\"Hello\");\n}')" class="btn btn-small">
                        Code
                    </button>
                </div>
            </section>

            <!-- Image Section -->
            <section class="card">
                <h2>🖼️ Send Image</h2>
                <div class="form-group">
                    <label class="file-label" for="imageInput">
                        <span>Choose Image</span>
                        <input 
                            type="file" 
                            id="imageInput" 
                            accept="image/*"
                            onchange="previewImage(this)"
                        >
                    </label>
                </div>
                <div id="imagePreview" class="preview"></div>
                <div class="button-row">
                    <button onclick="sendImage()" class="btn btn-primary" id="sendImageBtn" disabled>
                        Send Image
                    </button>
                    <button onclick="clearImage()" class="btn btn-secondary">
                        Clear
                    </button>
                </div>
            </section>

            <!-- File Section -->
            <section class="card">
                <h2>📁 Send File</h2>
                <div class="form-group">
                    <label class="file-label" for="fileInput">
                        <span>Choose File</span>
                        <input 
                            type="file" 
                            id="fileInput"
                            onchange="previewFile(this)"
                        >
                    </label>
                </div>
                <div id="filePreview" class="preview"></div>
                <div class="button-row">
                    <button onclick="sendFile()" class="btn btn-primary" id="sendFileBtn" disabled>
                        Send File
                    </button>
                    <button onclick="clearFile()" class="btn btn-secondary">
                        Clear
                    </button>
                </div>
            </section>

            <!-- Message History -->
            <section class="card">
                <h2>📜 Message History</h2>
                <div id="messageHistory" class="message-history"></div>
                <button onclick="clearHistory()" class="btn btn-secondary btn-block">
                    Clear History
                </button>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
