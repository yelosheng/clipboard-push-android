{% extends "base.html" %}

{% block title %}Login | Clipboard Man{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-box">
        <header class="login-header">
            <h1 style="font-size: 1.5rem; margin-bottom: 8px;">Access Required</h1>
            <p class="text-meta">Please authenticate to continue.</p>
        </header>

        <form method="POST">
            <div class="form-group">
                <label style="display: block; font-weight: 700; font-size: 0.875rem; margin-bottom: 8px;">ACCESS
                    CODE</label>
                <input type="password" name="password" required autofocus autocomplete="current-password">
            </div>

            <div class="form-group">
                <label class="checkbox-wrap">
                    <input type="checkbox" name="remember">
                    <span>Keep me signed in on this device</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">AUTHENTICATE</button>
        </form>

        <div style="margin-top: 32px; font-size: 0.75rem; color: #999; border-top: 1px solid #eee; padding-top: 16px;">
            Secure Relay Server v1.0<br>
            Authorized Personnel Only
        </div>
    </div>
</div>
{% endblock %}
